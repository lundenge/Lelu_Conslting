<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Left "l" — tall dark navy bar -->
  <rect x="34" y="28" width="18" height="88" rx="4" fill="#1B2F5E"/>
  <!-- Right "L" — shorter steel-blue bar with horizontal foot -->
  <rect x="62" y="48" width="18" height="68" rx="4" fill="#2E6FC4"/>
  <rect x="62" y="98" width="42" height="18" rx="4" fill="#2E6FC4"/>

  <!-- Abstract robotic hand / open palm suggestion -->
  <!-- Palm base -->
  <rect x="50" y="124" width="60" height="10" rx="5" fill="#B0C4DE" opacity="0.7"/>
  <!-- Three finger stubs -->
  <rect x="54" y="114" width="10" height="14" rx="5" fill="#C8D8EA" opacity="0.85"/>
  <rect x="70" y="110" width="10" height="18" rx="5" fill="#C8D8EA" opacity="0.85"/>
  <rect x="86" y="114" width="10" height="14" rx="5" fill="#C8D8EA" opacity="0.85"/>
  <!-- Blue accent dot on palm (wrist sensor) -->
  <circle cx="80" cy="130" r="3.5" fill="#2E6FC4"/>
</svg>
